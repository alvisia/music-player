<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="player-container">
        <!-- Song Properties -->
         <div class="img-container">
            <img src="img/alexgrohl-punk-rock.jpg" alt="Album Art">
         </div>
         <h2 id="title">Punk Rock</h2>
         <h3 id="artist">AlexGrohl</h3>
         <audio src="music/alexgrohl-punk-rock.mp3"></audio>
         <!-- Progress Bar -->
          <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
            <div class="duration-wrapper">
                <span id="current-time">0:00</span>
                <span id="duration">2:06</span>
            </div>
          </div>
          <!-- Controls -->
        <div class="controls">
            <div class="player-controls">
                <i class="fa-solid fa-backward" id="prev" title="Previous"></i>
                <i class="fa-solid fa-play main-button" id="play" title="Play"></i>
                <i class="fa-solid fa-forward" id="next" title="Next"></i>
            </div>
            <!-- Volume Contols -->
            <div class="volume">
                <div class="volume-icon">
                    <i class="fa-solid fa-volume-high" title="Mute" id="volume-icon"></i>
                </div>
                <div class="volume-range" title="Change Volume">
                    <div class="volume-bar"></div>
                </div>
            </div>
        </div>
    </div>
    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
